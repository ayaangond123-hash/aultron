<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/webp" href="../logo.webp">
<title>Create Account — Aultron AI</title>
<link rel="stylesheet" href="../css/global.css">
</head>
<body>
<div class="noise"></div>
<div class="scanlines"></div>

<nav class="nav">
  <a href="../index.html" class="nav-logo"><img src="../logo.webp" alt="Aultron AI" class="nav-logo-img">AULTRON<span>.</span>AI</a>
  <div class="nav-links">
    <a href="login.html" class="nav-cta">SIGN IN →</a>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo"><img src="../logo.webp" alt="Aultron" class="auth-logo-img">AULTRON<span>.</span>AI</div>
    <div class="auth-sub">Create your free account</div>
    <div class="alert alert-error" id="errMsg"></div>
    <div class="alert alert-success" id="okMsg"></div>
    <div class="form-group">
      <label class="form-label">DISPLAY NAME</label>
      <input type="text" class="form-input" id="name" placeholder="Your name">
    </div>
    <div class="form-group">
      <label class="form-label">EMAIL ADDRESS</label>
      <input type="email" class="form-input" id="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label class="form-label">PASSWORD</label>
      <input type="password" class="form-input" id="password" placeholder="Min 8 characters">
    </div>
    <button class="form-btn" id="signupBtn" onclick="handleSignup()">CREATE ACCOUNT →</button>
    <div class="form-divider">or</div>
    <div class="form-footer">Already have an account? <a href="login.html">Sign in</a></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { firebaseConfig } from "../js/config.js";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.handleSignup = async function() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('errMsg');
    const okEl = document.getElementById('okMsg');
    const btn = document.getElementById('signupBtn');

    errEl.style.display = 'none'; okEl.style.display = 'none';
    if (!name || !email || !password) { errEl.textContent = '⚠ Fill in all fields.'; errEl.style.display = 'block'; return; }
    if (password.length < 8) { errEl.textContent = '⚠ Password must be 8+ characters.'; errEl.style.display = 'block'; return; }

    btn.textContent = 'CREATING...'; btn.disabled = true;

    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: name });
      await setDoc(doc(db, 'users', cred.user.uid), { name, email, createdAt: serverTimestamp(), plan: 'free' });

      const token = await cred.user.getIdToken();
      localStorage.setItem('aultron_token', token);
      localStorage.setItem('aultron_uid', cred.user.uid);
      localStorage.setItem('aultron_name', name);

      okEl.textContent = '✓ Account created! Redirecting...'; okEl.style.display = 'block';
      setTimeout(() => { window.location.href = 'chat.html'; }, 1200);
    } catch(err) {
      btn.textContent = 'CREATE ACCOUNT →'; btn.disabled = false;
      const msgs = { 'auth/email-already-in-use':'Email already registered.', 'auth/invalid-email':'Invalid email.', 'auth/weak-password':'Password too weak.' };
      errEl.textContent = '⚠ ' + (msgs[err.code] || err.message); errEl.style.display = 'block';
    }
  };

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSignup(); });
</script>
</body>
</html>
